<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Saving Listing...</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; text-align: center; }
.success { color: #166534; background: #dcfce7; padding: 20px; border-radius: 8px; }
.error { color: #991b1b; background: #fee2e2; padding: 20px; border-radius: 8px; }
.loading { color: #666; }
h2 { margin-top: 0; }
.details { text-align: left; margin-top: 15px; font-size: 13px; line-height: 1.8; }
.field-name { color: #666; }
.field-value { color: #333; font-weight: 500; }
.field-value.empty { color: #999; font-style: italic; font-weight: normal; }
button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div id="status" class="loading">
<h2>Saving listing data...</h2>
<p>Please wait...</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const dataStr = params.get('data');

if (!dataStr) {
  document.getElementById('status').innerHTML = '<div class="error"><h2>No data received</h2><p>Use the bookmarklet from a listing page.</p></div>';
} else {
  try {
    const data = JSON.parse(decodeURIComponent(dataStr));

    // Helper to format field display
    function field(name, value) {
      const isEmpty = !value || value === 'null' || value === 'undefined';
      return `<span class="field-name">${name}:</span> <span class="field-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '(not found)' : value}</span><br>`;
    }

    // Show extracted data immediately
    document.getElementById('status').innerHTML = `
      <h2>Extracted Data</h2>
      <div class="details">
        ${field('Address', data.address)}
        ${field('Suburb', data.suburb)}
        ${field('Price', data.price_guide_text)}
        ${field('Beds', data.beds)}
        ${field('Baths', data.baths)}
        ${field('Parking', data.parking)}
        ${field('Property Type', data.property_type)}
        ${field('Cover Image', data.cover_image ? 'Yes' : null)}
      </div>
      <p style="color:#666; font-size:12px;">Saving...</p>
    `;

    fetch('/api/enrich-listing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
      if (result.ok) {
        document.getElementById('status').innerHTML = `
          <div class="success">
            <h2>Saved!</h2>
            <p>Matched: <strong>${result.matched}</strong></p>
            <div class="details">
              ${field('Address', data.address)}
              ${field('Suburb', data.suburb)}
              ${field('Price', data.price_guide_text)}
              ${field('Beds', data.beds)}
              ${field('Baths', data.baths)}
              ${field('Parking', data.parking)}
              ${field('Property Type', data.property_type)}
              ${field('Cover Image', data.cover_image ? 'Yes' : null)}
            </div>
            <p style="margin-top:15px; font-size:12px; color:#166534;"><strong>Updated:</strong> ${result.enriched.join(', ') || 'none'}</p>
          </div>
          <button onclick="window.close()">Close</button>
        `;
      } else {
        document.getElementById('status').innerHTML = `
          <div class="error">
            <h2>Error</h2>
            <p>${result.error}</p>
            <div class="details">
              ${field('Address', data.address)}
              ${field('Suburb', data.suburb)}
              ${field('Price', data.price_guide_text)}
            </div>
          </div>
          <button onclick="window.close()">Close</button>
        `;
      }
    })
    .catch(err => {
      document.getElementById('status').innerHTML = `
        <div class="error">
          <h2>Connection Error</h2>
          <p>${err.message}</p>
        </div>
        <button onclick="window.close()">Close</button>
      `;
    });
  } catch (e) {
    document.getElementById('status').innerHTML = `
      <div class="error">
        <h2>Invalid data</h2>
        <p>${e.message}</p>
      </div>
      <button onclick="window.close()">Close</button>
    `;
  }
}
</script>
</body>
</html>
